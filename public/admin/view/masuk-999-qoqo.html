<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
        }

        .flat-login-card {
            background-color: #ffffff;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-shadow: none !important; 
        }

        .form-control-flat {
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-shadow: none !important;
        }
        .form-control-flat:focus {
            border-color: #212529;
            background-color: #ffffff;
        }

        .btn-flat-dark {
            background-color: #212529;
            color: #ffffff;
            border: 1px solid #212529;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .btn-flat-dark:hover {
            background-color: #495057;
            border-color: #495057;
            color: #ffffff;
        }

        .btn-flat-link {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-flat-link:hover {
            color: #212529;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <div class="card flat-login-card p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold m-0">ADMIN ACCESS</h3>
                        <p class="text-muted small">Silakan masuk untuk mengelola Archive</p>
                    </div>

                    <div id="error-message" class="alert alert-danger d-none py-2 small rounded-1 border-0 text-center" style="background-color: #f8d7da; color: #842029;">
                        Email atau password salah!
                    </div>

                    <form id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold text-secondary">EMAIL ADDRESS</label>
                            <input type="email" id="email" class="form-control form-control-flat" placeholder="admin@email.com" required autocomplete="email">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold text-secondary">PASSWORD</label>
                            <input type="password" id="password" class="form-control form-control-flat" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                        
                        <button type="submit" class="btn btn-flat-dark w-100 py-2 fw-bold mb-3" id="btn-submit">
                            MASUK KE DASHBOARD
                        </button>
                    </form>

                    <div class="text-center">
                        <a href="../../index.html" class="btn-flat-link">&laquo; Kembali ke Beranda</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="../controller/auth-admin.js"></script>
</body>
</html>
