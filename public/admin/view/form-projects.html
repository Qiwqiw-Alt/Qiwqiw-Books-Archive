<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Tambah Projek Baru</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .preview-img {
            max-width: 150px;
            display: none;
            margin-top: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="mb-4">
                    <a href="admin.html" class="btn btn-outline-secondary btn-sm"> Kembali ke dashboard Admin</a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="card-title mb-0 text-center" id="form-header">Tambah Projek Baru</h4>
                    </div>

                    <div class="card-body p-4">
                        <form action="" method="POST" id="project-form">
                            <div class="mb-3">
                                <label for="title" class="form-label fw-bold">Judul Projek</label>
                                <input type="text" class="form-control" id="title" name="title" placeholder="Contoh: Projek IOT dengan Arduino R3" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="desc" class="form-label fw-bold">Deskripsi Projek</label>
                                <textarea class="form-control" id="desc" name="desc" placeholder="Contoh: Folder ini berisi kode sumber dari projek IOT menggunakan Arduino R3..." required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="cover" class="form-label fw-bold">Thumbnail Projek</label>
                                <input type="file" class="form-control" id="cover" name="cover" accept="image/*">
                            </div>

                            <div class="mb-3">
                                <div class="text-muted small mt-1"> Format gambar disarankan .jpg atau .png</div>
                                <img id="cover-preview" src="#" alt="Preview Cover" class="preview-img">
                            </div>

                            <div class="mb-3">
                                <label for="tech-stack" class="form-label fw-bold">Teknologi yang digunakan</label>
                                <input type="text" class="form-control" id="tech-stack" name="tech-stack" placeholder="Contoh: Laravel, Vue, Next.js,..." required>
                            </div>

                            <div class="mb-3">
                                <label for="project-category" class="form-label fw-bold">Kategori Projek</label>
                                <select name="category" id="project-category" class="form-select" required>
                                    <option value="web"> Web Application</option>
                                    <option value="mobile-app">Mobile App</option>
                                    <option value="iot">IOT/Robotics</option>
                                    <option value="ui-ux">UI/UX Design</option>
                                    <option value="other">Lainnya</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="project-url" class="form-label fw-bold">Tautan Projek</label>
                                <input type="url" name="project-url" id="project-url" placeholder="https://github.com/username/project">
                            </div>

                            <div class="mb-3">
                                <label for="production-url" class="form-label fw-bold">Tautan Demo Projek</label>
                                <input type="url" name="production-url" id="production-url" placeholder="https://fatisda.dev/">
                            </div>

                            <div class="mb-3">
                                <label for="status-project" class="form-label fw-bold">Status Projek</label>
                                <select name="status" id="status-project" class="form-select" required>
                                    <option value="finished">Finished</option>
                                    <option value="in-progress">In Progress</option>
                                    <option value="archived">Archived</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="created_year" class="form-label fw-bold">Tahun Pembuatan</label>
                                <input type="number" class="form-control" id="created_year" placeholder="Contoh: 2020" required>
                            </div>

                            <div id="message-area" class="mb-3 d-none alert"></div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary pt-2 pb-2" id="submit-btn">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
