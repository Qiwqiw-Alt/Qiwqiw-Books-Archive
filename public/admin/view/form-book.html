<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Tambah Buku Baru</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .preview-img {
            max-width: 150px;
            display: none;
            margin-top: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="mb-4">
                    <a href="admin.html" class="btn btn-outline secondary btn-sm"> Kembali ke dashboard Admin</a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="card-title mb-0 text-center" id="form-header">Tambah Buku Baru</h4>
                    </div>

                    <div class="card-body p-4">
                        <form action="" method="POST" id="book-form">
                            <div class="mb-3">
                                <label for="title" class="form-label fw-bold">Judul</label>
                                <input type="text" class="form-control" id="title" name="title" placeholder="Contoh: Range" required>
                            </div>

                            <div class="mb-3">
                                <label for="author" class="form-label fw-bold">Penulis</label>
                                <input type="text" class="form-control" id="author" name="author" placeholder="Contoh: David Epstein" required>
                            </div>

                            <div class="mb-3">
                                <label for="desc" class="form-label fw-bold">Rangkuman Buku</label>
                                <textarea class="form-control" id="desc" name="desc" placeholder="Contoh: Buku ini membahas tentang range dan bagaimana cara mengatasi tantangan dalam hidup." required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="cover" class="form-label fw-bold">Cover Buku</label>
                                <input type="file" class="form-control" id="cover" name="cover" accept="image/*">
                            </div>

                            <div class="mb-3">
                                <label for="published_year" class="form-label fw-bold">Tahun Terbit</label>
                                <input type="number" class="form-control" id="published_year" name="published_year" placeholder="Contoh: 2020" required>
                                <div class="text-muted small mt-1"> Format gambar disarankan .jpg atau .png</div>
                                <img id="cover-preview" src="#" alt="Preview Cover" class="preview-img">
                            </div>

                            <div id="message-area" class="mb-3 d-none alert"></div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary pt-2 pb-2" id="submit-btn">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
