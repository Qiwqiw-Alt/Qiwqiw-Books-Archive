<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- Bootstrap 5 Modal untuk Detail Projek (Flat Monokrom) -->
<div class="modal fade" id="projectDetailModal" tabindex="-1" aria-hidden="true">
  <!-- backdrop transparan hitam tipis diatur via CSS nanti -->
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content flat-modal-content p-4">
      
      <!-- Tombol Close Kotak Khas Flat Design -->
      <div class="d-flex justify-content-end mb-2">
        <button type="button" class="btn-close-flat" data-bs-dismiss="modal" aria-label="Close">X</button>
      </div>

      <!-- Konten Utama Diisi Dinamis oleh JavaScript -->
      <div class="modal-body p-0">
        <div class="mb-3">
          <span class="badge bg-light text-dark border mb-2" id="modal-project-tag">Tags</span>
          <h2 class="fw-bold text-uppercase m-0" id="modal-project-title">Nama Projek</h2>
        </div>
        
        <hr class="my-3" style="border-color: #dee2e6;">

        <!-- Wadah Deskripsi Poin-Poin seperti Tantangan/Hasil -->
        <div id="modal-project-details">
          <!-- Konten dinamis dari Firebase/Object JS akan disuntikkan di sini -->
        </div>
      </div>

    </div>
  </div>
</div>

<div class="text-center mt-5">
    <a href="list-book.html" class="btn-flat px-4 py-2 fw-bold">
        Explore more books summary &raquo;
    </a>
</div>

</body>
</html>
