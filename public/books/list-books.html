<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Rangkuman Buku - Qoqo</title>
    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom Style Flat Monokrom -->
    <style>
        body { 
            background-color: #ffffff; /* Putih Bersih */
            color: #212529; /* Hitam Arang */
            font-family: system-ui, -apple-system, sans-serif;
            transition: background 0.3s, color 0.3s;
        }
        
        /* Tema Dark Mode Monokrom */
        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark-mode .flat-card {
            background-color: #1e1e1e;
            border-color: #333333;
        }
        body.dark-mode .btn-flat-outline {
            color: #ffffff;
            border-color: #444444;
        }
        body.dark-mode .btn-flat-outline:hover {
            background-color: #333333;
        }

        /* Card Flat Tanpa Bayangan (No Shadow, Border Polos) */
        .flat-card {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            box-shadow: none !important; /* Wajib Flat */
        }

        /* Batasi tinggi gambar cover agar seragam dalam grid */
        .flat-cover-img {
            height: 240px;
            object-fit: cover;
            border-bottom: 1px solid #dee2e6;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }

        /* Tombol Flat Monokrom */
        .btn-flat {
            background-color: #212529;
            color: #ffffff !important;
            text-decoration: none;
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid #212529;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        .btn-flat:hover {
            background-color: #495057;
            border-color: #495057;
        }

        .btn-flat-outline {
            background-color: transparent;
            color: #212529;
            text-decoration: none;
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-flat-outline:hover {
            background-color: #f8f9fa;
            border-color: #212529;
        }
    </style>
</head>
<body>

    <nav class="navbar border-bottom mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark dark-mode-target" href="list-book.html"> Qoqo Book Archive</a>
            <div class="d-flex gap-2">
                <a href="homepage.html" class="btn-flat-outline">&laquo; Kembali ke Portofolio</a>
                <button id="theme-toggle" class="btn-flat-outline">Dark Mode</button>[cite: 4]
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold m-0">Semua Rangkuman Buku</h2>
                <p class="text-muted small">Kumpulan catatan dan intisari buku yang telah saya baca.</p>
            </div>
        </div>

        <div id="book-list" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>[cite: 4]
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/list-books.js"></script>
</body>
</html>
