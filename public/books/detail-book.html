<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Buku</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { 
            background-color: #ffffff; 
            color: #212529; 
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.3s, color 0.3s;
        }
        
        /* Tema Dark Mode Monokrom */
        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark-mode .flat-card {
            background-color: #1e1e1e;
            border-color: #333333;
        }
        body.dark-mode .btn-flat {
            background-color: #333333;
            color: #ffffff !important;
            border-color: #444444;
        }
        body.dark-mode .btn-flat:hover {
            background-color: #444444;
        }

        .flat-card {
            background-color: #ffffff;
            border: 1px solid #dee2e6; 
            border-radius: 4px;
            box-shadow: none !important; 
        }

  
        .flat-cover-img {
            border: 1px solid #ced4da;
            border-radius: 4px;
            max-width: 100%;
            height: auto;
        }

        .btn-flat {
            background-color: #212529; 
            color: #ffffff !important;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            padding: 8px 16px;
            border: 1px solid #212529;
            border-radius: 4px;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-flat:hover {
            background-color: #495057; 
            border-color: #495057;
        }
        
        .text-muted-custom {
            color: #6c757d; 
        }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-9 col-md-11">
                <div class="d-flex jutify-content-between align-items-center mb-4">
                    <a href="homepage.html" class="btn-flat">
                        &laquo; Kembali
                    </a>

                    <button id="theme-toggle" class="btn-flat" style="background-color: #6c757d; border-color: #6c757d;">
                        Dark Mode[cite: 2]
                    </button>
                </div>

                <div class="col-md-8">
                    <div class="mb-3">
                            <span class="badge bg-light text-dark border mb-2" id="book-year">Tahun: --</span>
                            <h1 id="book-title" class="fw-bold h2 m-0">Memuat Judul Buku...</h1>
                            <p id="book-author" class="text-muted-custom my-1 fs-5">Oleh: --</p>
                    </div>
                            
                    <hr class="my-3" style="border-color: #dee2e6;">
                            
                    <h6 class="fw-bold text-uppercase text-muted-custom mb-2" style="letter-spacing: 0.5px;">
                         Rangkuman Buku:
                    </h6>
                    <!-- Menampilkan deskripsi lengkap -->
                        <p id="desc" class="fs-6" style="white-space: pre-line; line-height: 1.6;"></p>[cite: 2]
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../books/js/detail-book.js"></script>
</body>
</html>
