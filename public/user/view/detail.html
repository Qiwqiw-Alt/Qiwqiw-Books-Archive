<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Buku</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .detail-cover { max-width: 250px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="mb-4">
                    <a href="home.html" class="btn btn-outline-secondary btn-sm">Kembali</a>
                </div>

                <div class="card shadow-sm p-4">
                    <div class="row g-4">
                        <div class="col-md-4 text-center">
                            <img id="book-cover" src="" alt="Cover Buku" class="detail-cover img-fluid">
                        </div>
                        <div class="col-md-8">
                            <h2 id="book-title" class="fw-bold"></h2>
                            <h5 id="book-author" class="text-muted mb-3"></h5>
                            <span id="book-year" class="badge bg-secondary mb-4"></span>
                            <hr>
                            <h6 class="fw-bold"> Rangkuman/Deskripsi Buku</h6>
                            <p id="book-desc" style="white-space: pre-line; line-height: 1.6;"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../controller/detail.js"></script>
</body>
</html>
