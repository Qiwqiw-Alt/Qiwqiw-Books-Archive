<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #ffffff; /* Putih Bersih */
            color: #212529; /* Hitam Arang */
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
        }

        .error-wrapper {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
            color: #212529;
            margin-bottom: 1rem;
        }

        .flat-divider {
            border-top: 2px solid #212529;
            width: 60px;
            margin: 1.5rem auto;
        }

        .btn-flat {
            background-color: #212529;
            color: #ffffff !important;
            text-decoration: none;
            display: inline-block;
            padding: 10px 24px;
            border: 1px solid #212529;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }
        .btn-flat:hover {
            background-color: #495057;
            border-color: #495057;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center text-center">

    <div class="error-wrapper">
        <div class="error-code">404</div>
        
        <h4 class="fw-bold text-uppercase mb-2">Halaman Tidak Ditemukan</h4>
        <p class="text-secondary small px-3">
            Maaf, tautan yang Anda tuju salah, telah dihapus, atau arsip dipindahkan ke koordinat lain.
        </p>
        
        <div class="flat-divider"></div>
        
        <div class="mt-4">
            <a href="index.html" class="btn-flat">
                &laquo; Kembali ke Beranda
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
