<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Projek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #212529; font-family: system-ui, sans-serif; }
        .flat-card { border: 1px solid #dee2e6; border-radius: 4px; box-shadow: none !important; }
        .btn-flat { background-color: #212529; color: #ffffff !important; border: 1px solid #212529; border-radius: 4px; text-decoration: none; padding: 8px 16px; }

    </style>
</head>

    <div class="container my-5">

                </div>

                <div class="card flat-card p-4 p-md-5">
                    <div class="mb-3">
                        <span class="badge bg-light text-dark border mb-2" id="project-tag">Category</span>
                        <h1 class="fw-bold h2 m-0" id="project-title">Memuat Nama Projek...</h1>
                    </div>
                    
                    <hr class="my-4" style="border-color: #dee2e6;">

                    <div id="project-details-content">
